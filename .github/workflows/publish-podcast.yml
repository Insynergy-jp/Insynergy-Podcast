name: Publish podcast

on:
  push:
    branches: [main]
    paths:
      - "Insights/**"
      - "Podcast/Episodes/**"
      - "Podcast/Assets/**"
      - "Podcast/podcast.yml"
      - "Tools/**"
      - "tests/**"
      - ".github/workflows/publish-podcast.yml"
  workflow_dispatch:
    inputs:
      force_regeneration:
        description: Regenerate all published episodes even if source is unchanged
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: podcast-publishing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PODCAST_EMAIL: ${{ vars.PODCAST_EMAIL }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || 'private' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Tools/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r Tools/requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build changed episodes
        id: build_changed
        if: ${{ !inputs.force_regeneration }}
        run: python Tools/run_pipeline.py --strict-email

      - name: Force-build all episodes
        id: force_build
        if: ${{ inputs.force_regeneration }}
        run: python Tools/run_pipeline.py --strict-email --force

      - name: Publish missing episodes to YouTube
        run: python Tools/youtube_publish.py

      - name: Commit durable episode outputs
        if: ${{ always() && (steps.build_changed.outcome == 'success' || steps.force_build.outcome == 'success') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Podcast/Scripts Podcast/Audio Podcast/Metadata
          if git diff --cached --quiet; then
            echo "No durable episode changes"
          else
            git commit -m "Publish generated podcast episode assets [skip ci]"
            git push
          fi

      - name: Upload downloadable podcast artifact
        uses: actions/upload-artifact@v7
        with:
          name: podcast-${{ github.run_number }}
          path: |
            Podcast/Scripts/*.md
            Podcast/Audio/*.mp3
            Podcast/Metadata/*.json
            Podcast/Public/podcast.xml
          if-no-files-found: error
          retention-days: 30

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: Podcast/Public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
