name: Generate podcast MP3

on:
  workflow_dispatch:
    inputs:
      article_path:
        description: Markdown path in this repository
        required: true
        default: "Insights/The Question They Didn’t Ask at Davos.md"
        type: string
      duration:
        description: Estimated duration in minutes
        required: true
        default: "8"
        type: string
      voice:
        description: OpenAI TTS voice
        required: true
        default: nova
        type: choice
        options:
          - nova
          - alloy
          - echo
          - fable
          - onyx
          - shimmer

permissions:
  contents: read

concurrency:
  group: podcast-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OBSIDIAN_VAULT_PATH: ${{ github.workspace }}
      INSIGHTS_DIRECTORY: Insights
      OPENAI_TEXT_MODEL: gpt-5.4-mini
      OPENAI_TTS_MODEL: tts-1-hd
      OPENAI_TTS_VOICE: ${{ inputs.voice }}
      ARTICLE_PATH: ${{ inputs.article_path }}
      DURATION: ${{ inputs.duration }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Tools/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r Tools/requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Generate script, metadata, and MP3
        run: python Tools/generate_podcast.py "$ARTICLE_PATH" --duration "$DURATION" --voice "$OPENAI_TTS_VOICE"

      - name: Upload podcast artifact
        uses: actions/upload-artifact@v7
        with:
          name: podcast-${{ github.run_number }}
          path: |
            Podcast/Scripts/*.md
            Podcast/Audio/*.mp3
            Podcast/Metadata/*.json
          if-no-files-found: error
          retention-days: 30
